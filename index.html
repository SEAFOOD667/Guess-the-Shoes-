<!DOCTYPE html>

<html lang="th">

<head>

    <meta charset="UTF-8">

    <title>Guess the Shoes: Bilingual Edition</title>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');



        body {

            font-family: 'Kanit', sans-serif;

            background-color: #0a0a0a;

            color: #fff;

            display: flex;

            flex-direction: column;

            align-items: center;

            min-height: 100vh;

            margin: 0;

            padding: 20px;

            -webkit-user-select: none;

            user-select: none;

        }



        h1 { color: #00d4ff; text-shadow: 0 0 15px rgba(0,212,255,0.5); }

.score-board {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .game-container {
    display: flex;
    justify-content: center; /* จัดให้อยู่กลางหน้าจอ */
    align-items: flex-start;
    flex-wrap: nowrap;       /* บังคับแถวเดียว */
    gap: 15px;               /* ลดระยะห่างนิดหน่อยเพื่อให้เบียดกันลงตัว */
    width: 95%;              /* ใช้พื้นที่ 95% ของหน้าจอ */
    max-width: 1400px;       /* กว้างสุดไม่เกินนี้ */
    margin: 20px auto;
    overflow: visible !important;
    padding: 20px 10px; 
}



/* กล่องใส่รูปภาพ */

    .img-box {

        background: #3d3d3d

        border: 2px solid #555 !important; /* ขอบสีเทาสว่างขึ้นนิดหน่อย */

    }

        }



        .img-box {

            width: 100%;

            height: 450px;

            background: #c9bfb3;

            border-radius: 12px;

            overflow: hidden;

            position: relative;

            margin-bottom: 15px;

        }



        .mask {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 82%; /* ปิดเหลือแค่ช่วงเท้าจริงๆ */

            background: #000;

            z-index: 2;

            transition: height 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);

            border-bottom: 2px dashed #00d4ff;

        }



        .character-card {
    /* ใช้ flex-basis: 33% เพื่อให้แบ่งพื้นที่เป็น 3 ส่วนเท่าๆ กันพอดีจอ */
    flex: 1 1 30%;           
    min-width: 300px;        /* กันไม่ให้หดจนจิ๋วเกินไป */
    background: #1a1a1a;
    padding: 15px;
    border-radius: 16px;
    border: 2px solid #333;
    box-sizing: border-box;  /* สำคัญ: ให้ padding ไม่ไปเพิ่มความกว้างการ์ด */
}



        .correct {
    transform: scale(1.05); /* ขยายใหญ่ขึ้น 5% */
    box-shadow: 0 0 25px 10px rgba(0, 255, 136, 0.7); /* เรืองแสงสีเขียว */
    border: 3px solid #00ff88 !important;
/* สำคัญ: เพื่อให้ box-shadow แสดงผลได้ดี */
    position: relative; 
    z-index: 10; /* ดันการ์ดที่ถูกขึ้นมาข้างบนสุด */
}
        .correct .mask { height: 0; border: none; }

        .correct .img-box { border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.3); }

        .correct .input-area { display: none; }



        .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-sizing: border-box; /* บังคับให้ขนาดรวมทุกอย่างไม่เกินตัวแม่ */
}



        input[type="text"] {
    width: 100%;           /* กว้างเต็ม */
    padding: 12px;
    box-sizing: border-box; /* สำคัญมาก: กันล้น */
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: white;
    font-size: 1rem;
}



        .check-btn {
    width: 100%;           /* กว้างเต็ม */
    padding: 12px;
    box-sizing: border-box; /* สำคัญมาก: กันล้น */
    border-radius: 8px;
    background: #00d4ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border: none;
    font-size: 1rem;
}



        .reveal-name {

            display: none;

            color: #00ff88;

            font-weight: bold;

            margin-top: 10px;

            font-size: 1.1rem;

        }

        .correct .reveal-name { display: block; }



        .refresh-btn {

            margin-top: 40px;

            padding: 12px 30px;

            background: transparent;

            color: #00d4ff;

            border: 2px solid #00d4ff;

            border-radius: 50px;

            cursor: pointer;

            transition: 0.3s;

        }

        .refresh-btn:hover { background: #00d4ff; color: #000; }

    </style>

</head>

<body>
    <h1>👟 Guess the Shoes!</h1>
    <p>ทายชื่อตัวละครจากรองเท้า (รองรับชื่อไทย/อังกฤษ)</p>
    <div class="score-board">
        🏆 ทายถูกแล้ว: <span id="current-score">0</span> 
        / ทั้งหมด: <span id="total-chars">0</span> ตัว
    </div>

    <div class="game-container" id="game-board"></div>

    <button class="refresh-btn" onclick="startGame()">สุ่มตัวละครชุดใหม่</button>

    <script>
        // รายการตัวละคร (เพิ่มชื่อไทยและอังกฤษใน Array 'names')
        const animeData = [

            { names: ["มิคุ", "มิกุ", "miku"], img: "images/0095miku.png" },
            { names: ["เรม", "rem"], img: "images/0096rem.png" },
            { names: ["ลูโด้", "ลูโด", "rudo"], img: "images/0097rudo.png" },
            { names: ["เซเลอร์มูน", "sailor moon"], img: "images/0098sailor moon.png" },
            { names: ["มิโดริยะ", "midoriya"], img: "images/0099midoriya.png" },
            { names: ["โซโร", "zoro"], img: "images/0100zoro.png" },
            { names: ["นารูโตะ", "naruto"], img: "images/0101naruto.png" },
            { names: ["โกโจ", "gojo"], img: "images/0102gojo.png" },
            { names: ["ทันจิโร่", "tanjiro"], img: "images/0103tanjiro.png" },
            { names: ["คาเนกิ", "kaneki"], img: "images/0104kaneki.png" },
            { names: ["ซาสึเกะ", "sasuke"], img: "images/0105sasuke.png" },
            { names: ["ไซตามะ", "saitama"], img: "images/0106saitama.png" },
            { names: ["ซันจิ", "sanji"], img: "images/0107sanji.png" },
];

         let solvedCount = 0;
        // --- ส่วนที่ 2: ฟังก์ชันสำหรับเริ่มต้นเกม หรือ สุ่มใหม่ ---
function startGame() {
    if (typeof animeData === 'undefined') return;

    // 1. กรองตัวที่ยังไม่ถูกทาย
    const remainingOptions = animeData.filter(char => !char.solved);

    // 2. อัปเดตตัวเลข Score Board
    const solvedCountActual = animeData.filter(c => c.solved).length;
    document.getElementById('current-score').innerText = solvedCountActual;
    document.getElementById('total-chars').innerText = animeData.length;

    const board = document.getElementById('game-board');
    board.innerHTML = '';

    // 3. เช็คจบเกม
    if (remainingOptions.length === 0) {
        board.innerHTML = `<div style="grid-column: 1/-1; text-align:center; width:100%;">
            <h2 style="color: #00ff88; font-size: 2rem;">🎉 ทายครบหมดแล้ว ${animeData.length} ตัว! คุณคือปรมาจารย์!</h2>
            <button class="refresh-btn" onclick="location.reload()">เริ่มใหม่ทั้งหมด</button>
        </div>`;
        return;
    }

    // 4. สุ่มจากตัวที่เหลือมา 3 ตัว (หรือตามที่เหลือจริง)
    const countToPick = Math.min(3, remainingOptions.length);
    const shuffled = [...remainingOptions].sort(() => 0.5 - Math.random()).slice(0, countToPick);

    // 5. สร้างการ์ดแสดงผล
    shuffled.forEach((char, i) => {
        const card = document.createElement('div');
        card.className = 'character-card';
        card.id = `card-${i}`;
        card.dataset.refName = char.names[0]; 
        card.dataset.answers = JSON.stringify(char.names);
        card.dataset.wrongCount = 0;

        card.innerHTML = `
            <div class="img-box" style="position: relative; overflow: hidden; height: 500px; width: 100%; border-radius: 12px; border: 2px solid #ddd; background: #787878; display: flex; align-items: flex-end; justify-content: center;">
                <div class="mask" style="position: absolute; top: 0; left: 0; width: 100%; height: 82%; background: #000; z-index: 2; transition: height 0.5s ease-out; border-bottom: 2px dashed #00d4ff; display: flex; align-items: center; justify-content: center; font-size: 3rem;">🕵️‍♂️</div>
                <img src="${char.img}" class="character-img" draggable="false" oncontextmenu="return false;" 
                     style="width: 100%; height: 100%; object-fit: contain; object-position: center bottom;">
            </div>
            <div class="input-area" style="width: 100%; margin-top: 15px;">
                <input type="text" placeholder="ชื่อตัวละคร..." id="in-${i}" style="width: 100%; box-sizing: border-box; font-size: 1.2rem; padding: 12px;" onkeypress="if(event.key === 'Enter') checkAnswer(${i})">
                <button class="check-btn" onclick="checkAnswer(${i})" style="width: 100%; margin-top: 10px; padding: 12px; font-size: 1.1rem; cursor: pointer;">ตรวจคำตอบ</button>
            </div>
            <div class="reveal-name" style="text-align: center; font-size: 1.5rem; margin-top: 10px; display: none;">✨ ${char.names[0]} ✨</div>
        `;
        board.appendChild(card);
    });
}

function checkAnswer(i) {
    const inputField = document.getElementById(`in-${i}`);
    const userInput = inputField.value.trim().toLowerCase();
    const card = document.getElementById(`card-${i}`);
    const mask = card.querySelector('.mask');
    const revealArea = card.querySelector('.reveal-name');
    
    const correctAnswers = JSON.parse(card.dataset.answers);
    const isCorrect = correctAnswers.some(name => name.trim().toLowerCase() === userInput);
    let wrongCount = parseInt(card.dataset.wrongCount) || 0;

    if (isCorrect) {
        // ตอบถูก
        if (mask) mask.style.height = "0";
        card.classList.add('correct');
        card.style.borderColor = "#00ff88";
        
        // Flag ในข้อมูลหลัก
        const refName = card.dataset.refName;
        const targetChar = animeData.find(c => c.names[0] === refName);
        if (targetChar) targetChar.solved = true;

        // อัปเดตคะแนน
        const currentSolved = animeData.filter(c => c.solved).length;
        document.getElementById('current-score').innerText = currentSolved;

        revealArea.style.display = 'block';
        card.querySelector('.input-area').style.display = 'none';
    } else {
        // ตอบผิด
        wrongCount++;
        card.dataset.wrongCount = wrongCount;
        
        const newHeight = Math.max(0, 82 - (wrongCount * 13.6)); 
        if (mask) mask.style.height = newHeight + "%";

        if (wrongCount >= 6) {
            if (mask) mask.style.height = "0";
            revealArea.style.display = 'block'; 
            revealArea.style.color = '#ff4444';
            revealArea.innerHTML = `❌ เฉลยคือ: <b>${correctAnswers[0]}</b>`;
            card.querySelector('.input-area').style.display = 'none';
            
            // หมายเหตุ: กรณีตอบผิดจนครบ 6 ครั้ง เรามักจะไม่ Flag solved=true 
            // เพื่อให้มันวนกลับมาให้ทายใหม่ในชุดถัดๆ ไปจนกว่าจะถูก
        } else {
            // เอฟเฟกต์สั่น
            card.style.transform = "translateX(8px)";
            setTimeout(() => card.style.transform = "translateX(-8px)", 80);
            setTimeout(() => card.style.transform = "translateX(0)", 160);
            card.style.borderColor = "#ff4444";
            setTimeout(() => { if(!card.classList.contains('correct')) card.style.borderColor = "#333"; }, 1000);
            inputField.value = '';
            inputField.placeholder = `ผิดครั้งที่ ${wrongCount}/6`;
        }
    }
}

window.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
window.onload = startGame;

</script>
