        body {

            font-family: 'Kanit', sans-serif;

            background-color: #0a0a0a;

            color: #fff;

            display: flex;

            flex-direction: column;

            align-items: center;

            min-height: 100vh;

            margin: 0;

            padding: 20px;

            -webkit-user-select: none;

            user-select: none;

        }



        h1 { color: #00d4ff; text-shadow: 0 0 15px rgba(0,212,255,0.5); }



        .game-container {

            display: flex;

            justify-content: center;

            gap: 20px;

            flex-wrap: wrap;

            max-width: 1200px;

            margin-top: 20px;

        }



/* กล่องใส่รูปภาพ */

    .img-box {

        background: #3d3d3d

        border: 2px solid #555 !important; /* ขอบสีเทาสว่างขึ้นนิดหน่อย */

    }

        }



        .img-box {

            width: 100%;

            height: 350px;

            background: #3d3d3d;

            border-radius: 12px;

            overflow: hidden;

            position: relative;

            margin-bottom: 15px;

        }



        .mask {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 82%; /* ปิดเหลือแค่ช่วงเท้าจริงๆ */

            background: #000;

            z-index: 2;

            transition: height 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);

            border-bottom: 2px dashed #00d4ff;

        }



        .character-img {

            width: 100%;

            height: 100%;

            object-fit: cover;

            opacity: 1; /* สว่างปกติ */

            -webkit-user-drag: none;

            user-drag: none;

        }



        .correct .mask { height: 0; border: none; }

        .correct .img-box { border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.3); }

        .correct .input-area { display: none; }



        .input-area { display: flex; flex-direction: column; gap: 8px; }



        input {

            padding: 10px;

            border-radius: 8px;

            border: 1px solid #444;

            background: #222;

            color: #fff;

            text-align: center;

            font-family: 'Kanit';

            user-select: text;

        }



        button.check-btn {

            background: #00d4ff;

            color: #000;

            border: none;

            padding: 10px;

            border-radius: 8px;

            cursor: pointer;

            font-weight: bold;

        }



        .reveal-name {

            display: none;

            color: #00ff88;

            font-weight: bold;

            margin-top: 10px;

            font-size: 1.1rem;

        }

        .correct .reveal-name { display: block; }



        .refresh-btn {

            margin-top: 40px;

            padding: 12px 30px;

            background: transparent;

            color: #00d4ff;

            border: 2px solid #00d4ff;

            border-radius: 50px;

            cursor: pointer;

            transition: 0.3s;

        }

        .refresh-btn:hover { background: #00d4ff; color: #000; }

    </style>

function startGame() {

        const board = document.getElementById('game-board');

        board.innerHTML = '';

        

        // สุ่มตัวละคร 5 ตัว

        const shuffled = [...animeData].sort(() => 0.5 - Math.random()).slice(0, 5);



        shuffled.forEach((char, i) => {

            const card = document.createElement('div');

            card.className = 'character-card';

            card.id = `card-${i}`;

            card.dataset.answers = JSON.stringify(char.names);



            // บล็อกโค้ดที่แก้ไขใหม่ ให้ภาพอยู่ชิดขอบล่างและไม่ขาด

            card.innerHTML = `

                <div class="img-box" style="position: relative; overflow: hidden; height: 350px; width: 100%; border-radius: 12px; border: 2px solid #333; background: #000; transition: 0.3s; margin-bottom: 15px; display: flex; align-items: flex-end; justify-content: center;">

                    <div class="mask">🕵️‍♂️</div>

                    <img src="${char.img}" class="character-img" draggable="false" oncontextmenu="return false;" 

                         style="max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; transition: filter 0.5s, transform 0.5s, opacity 0.5s;">

                </div>

                <div class="input-area">

                    <input type="text" placeholder="ชื่อตัวละคร..." id="in-${i}">

                    <button class="check-btn" onclick="checkAnswer(${i})">ตรวจคำตอบ</button>

                </div>

                <div class="reveal-name">✨ ${char.names[0]} (${char.names[1].toUpperCase()}) ✨</div>

            `;

            board.appendChild(card);

        });

    }



    function checkAnswer(i) {

        const userInput = document.getElementById(`in-${i}`).value.trim().toLowerCase();

        const card = document.getElementById(`card-${i}`);

        const correctAnswers = JSON.parse(card.dataset.answers);

        const isCorrect = correctAnswers.some(name => name.toLowerCase() === userInput);



        if (isCorrect) {

            card.classList.add('correct');

        } else {

            card.style.transform = "translateX(8px)";

            setTimeout(() => card.style.transform = "translateX(-8px)", 80);

            setTimeout(() => card.style.transform = "translateX(0)", 160);

            card.style.borderColor = "#ff4444";

            setTimeout(() => card.style.borderColor = "#333", 1000);

        }

    }



    // กันการลากรูป

    window.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });

    window.onload = startGame;

</script>
