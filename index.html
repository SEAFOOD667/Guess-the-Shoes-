        }



        .img-box {

            height: 450px;

            background: #c9bfb3;

            border-radius: 12px;

            overflow: hidden;

            position: relative;

            margin-bottom: 15px;

        }



        .mask {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 82%; /* ปิดเหลือแค่ช่วงเท้าจริงๆ */

            background: #000;

            z-index: 2;

            border-bottom: 2px dashed #00d4ff;

        }



        .character-card {
    /* ใช้ flex-basis: 33% เพื่อให้แบ่งพื้นที่เป็น 3 ส่วนเท่าๆ กันพอดีจอ */
    flex: 1 1 30%;

    padding: 15px;
    border-radius: 16px;
    border: 2px solid #333;
    box-sizing: border-box;  /* สำคัญ: ให้ padding ไม่ไปเพิ่มความกว้างการ์ด */
}



        .correct {
    transform: scale(1.05); /* ขยายใหญ่ขึ้น 5% */

/* สำคัญ: เพื่อให้ box-shadow แสดงผลได้ดี */
    position: relative;

}
        .correct .mask { height: 0; border: none; }

        .correct .img-box { border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.3); }

        .correct .input-area { display: none; }



        .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-sizing: border-box; /* บังคับให้ขนาดรวมทุกอย่างไม่เกินตัวแม่ */

        input[type="text"] {

function startGame() {
    if (typeof animeData === 'undefined') return;

    // 1. ดึงตัวที่ "ยังไม่ถูกทาย"
    const remainingOptions = animeData.filter(char => !char.solved);

    // 2. อัปเดตตัวเลขคะแนนบนหน้าจอ
    const solvedCountActual = animeData.filter(c => c.solved).length;
    document.getElementById('current-score').innerText = solvedCountActual;
    document.getElementById('total-chars').innerText = animeData.length;

    const board = document.getElementById('game-board');
    board.innerHTML = '';

    // 3. ถ้าทายครบหมดแล้วให้โชว์ข้อความฉลอง
    if (remainingOptions.length === 0) {
        board.innerHTML = `<div style="grid-column: 1/-1; text-align:center; width:100%; padding: 40px;">
            <h2 style="color: #00ff88; font-size: 2.5rem;">🎉 ยินดีด้วย! คุณทายครบ ${animeData.length} ตัวแล้ว!</h2>
            <button class="refresh-btn" onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2rem; cursor:pointer;">เริ่มใหม่ทั้งหมด</button>
        </div>`;
        return;
    }

    // 4. สร้างรายชื่อ Autocomplete (เอาเฉพาะตัวที่ยังไม่ถูกทายมาโชว์ในลิสต์)
    const allNamesHTML = remainingOptions.map(char => `<option value="${char.names[0]}">`).join('');

    // 5. สุ่มตัวละครมา 3 ตัวจากที่เหลือ
    const countToPick = Math.min(3, remainingOptions.length);
    const shuffled = [...remainingOptions].sort(() => 0.5 - Math.random()).slice(0, countToPick);

    // 6. สร้างการ์ดแสดงผล
    shuffled.forEach((char, i) => {
        const card = document.createElement('div');
        card.className = 'character-card';
        card.id = `card-${i}`;
        
        // เก็บข้อมูลสำคัญไว้ในการ์ด
        card.dataset.refName = char.names[0]; 
        card.dataset.answers = JSON.stringify(char.names);
        card.dataset.wrongCount = 0;

        card.innerHTML = `
            <div class="img-box" style="position: relative; overflow: hidden; height: 500px; width: 100%; border-radius: 12px; border: 2px solid #ddd; background: #787878; display: flex; align-items: flex-end; justify-content: center;">
                <div class="mask" style="position: absolute; top: 0; left: 0; width: 100%; height: 82%; background: #000; z-index: 2; transition: all 0.5s ease-out; border-bottom: 2px dashed #00d4ff; display: flex; align-items: center; justify-content: center; font-size: 3rem;">🕵️‍♂️</div>
                <img src="${char.img}" class="character-img" draggable="false" oncontextmenu="return false;" 
                     style="width: 100%; height: 100%; object-fit: contain; object-position: center bottom;">
            </div>
            <div class="input-area" style="width: 100%; margin-top: 15px;">
                <input type="text" list="list-${i}" placeholder="พิมพ์ชื่อตัวละคร..." id="in-${i}" 
                       style="width: 100%; box-sizing: border-box; font-size: 1.2rem; padding: 12px;" 
                       onkeypress="if(event.key === 'Enter') checkAnswer(${i})">
                
                <datalist id="list-${i}">
                    ${allNamesHTML}
                </datalist>

                <button class="check-btn" onclick="checkAnswer(${i})" style="width: 100%; margin-top: 10px; padding: 12px; font-size: 1.1rem; cursor: pointer;">ตรวจคำตอบ</button>
            </div>
            <div class="reveal-name" style="text-align: center; font-size: 1.5rem; margin-top: 10px; display: none;">✨ ${char.names[0]} ✨</div>
        `;
        board.appendChild(card);
    });
}

function checkAnswer(i) {
    const inputField = document.getElementById(`in-${i}`);
    const userInput = inputField.value.trim().toLowerCase();
    const card = document.getElementById(`card-${i}`);
    const mask = card.querySelector('.mask');
    const revealArea = card.querySelector('.reveal-name');
    
    const correctAnswers = JSON.parse(card.dataset.answers);
    const isCorrect = correctAnswers.some(name => name.trim().toLowerCase() === userInput);
    let wrongCount = parseInt(card.dataset.wrongCount) || 0;

    if (isCorrect) {
        // ตอบถูก
        if (mask) {
            mask.style.height = "0"; // รูดม่านขึ้น
            mask.style.opacity = "0"; // จางหายไป (กันอีโมจิค้าง)
            mask.style.pointerEvents = "none"; // กันคลิกโดน
        }
        card.classList.add('correct');
        card.style.borderColor = "#00ff88";
        
        // Flag ในข้อมูลหลัก
        const refName = card.dataset.refName;
        const targetChar = animeData.find(c => c.names[0] === refName);
        if (targetChar) targetChar.solved = true;

        // อัปเดตคะแนน
        const currentSolved = animeData.filter(c => c.solved).length;
        document.getElementById('current-score').innerText = currentSolved;

        revealArea.style.display = 'block';
        card.querySelector('.input-area').style.display = 'none';
    } else {
        // ตอบผิด
        wrongCount++;
        card.dataset.wrongCount = wrongCount;
        
        const newHeight = Math.max(0, 82 - (wrongCount * 13.6)); 
        if (mask) mask.style.height = newHeight + "%";

        if (wrongCount >= 6) {
            if (mask) {
                mask.style.height = "0";
                mask.style.opacity = "0"; // เพิ่มบรรทัดนี้ครับ!
            }
            revealArea.style.display = 'block'; 
            revealArea.style.color = '#ff4444';
            revealArea.innerHTML = `❌ เฉลยคือ: <b>${correctAnswers[0]}</b>`;
            card.querySelector('.input-area').style.display = 'none';
            
            // หมายเหตุ: กรณีตอบผิดจนครบ 6 ครั้ง เรามักจะไม่ Flag solved=true 
            // เพื่อให้มันวนกลับมาให้ทายใหม่ในชุดถัดๆ ไปจนกว่าจะถูก
        } else {
            // เอฟเฟกต์สั่น
            card.style.transform = "translateX(8px)";
            setTimeout(() => card.style.transform = "translateX(-8px)", 80);
            setTimeout(() => card.style.transform = "translateX(0)", 160);
            card.style.borderColor = "#ff4444";
            setTimeout(() => { if(!card.classList.contains('correct')) card.style.borderColor = "#333"; }, 1000);
            inputField.value = '';
            inputField.placeholder = `ผิดครั้งที่ ${wrongCount}/6`;
        }
    }
}

window.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
window.onload = startGame;
